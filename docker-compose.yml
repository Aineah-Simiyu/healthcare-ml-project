services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: health_app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: health
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_app -d health"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_URL: postgresql://health_app:password@postgres:5432/health
      MODEL_PIPELINE_PATH: models/healthcare_model_pipeline.pkl
      MODEL_PACKAGE_PATH: models/healthcare_model.pkl
      RAW_PATH: data/raw/healthcare_dataset.csv
      CLEANED_PATH: scripts/data/cleaned_healthcare.csv
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      FLASK_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/scripts/entrypoint.sh"]
    restart: always

  airflow:
    build: .
    ports:
      - "8080:8080"
    environment:
      AIRFLOW_HOME: /app/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://health_app:password@postgres:5432/health
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__BASE_URL: ""
      PYTHONPATH: /app
      DB_URL: postgresql://health_app:password@postgres:5432/health
    command: >
      bash -c "
        echo 'Initializing Airflow...' &&
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        echo 'Starting Airflow standalone...' &&
        airflow standalone
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data: